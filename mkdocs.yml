site_name: pyscan-yb
site_url: https://ybhaw.github.io/pyscan-yb/
repo_url: https://github.com/ybhaw/pyscan-yb
repo_name: ybhaw/pyscan-yb

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - API Reference: api.md
  - CLI Usage: cli.md
  - Contributing: contributing.md

markdown_extensions:
  - tables
  - admonitions
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
